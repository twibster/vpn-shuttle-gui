<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="textGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#b0b0b0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <rect x="1" y="1" width="126" height="126" rx="23" fill="none" stroke="#333" stroke-width="1"/>
  <g filter="url(#glow)">
    <text x="64" y="72" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="42" font-weight="800" letter-spacing="4" text-anchor="middle" fill="url(#textGlow)">VPN</text>
  </g>
  <rect x="24" y="82" width="80" height="1.5" rx="1" fill="#444"/>
  <text x="64" y="96" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9" font-weight="400" letter-spacing="6" text-anchor="middle" fill="#666">SHUTTLE</text>
</svg>
